[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:dashboard]
command=node /home/developer/projects/adaptive-dashboard/.next/standalone/server.js
directory=/home/developer/projects/adaptive-dashboard
autostart=true
autorestart=true
stderr_logfile=/var/log/dashboard/err.log
stdout_logfile=/var/log/dashboard/out.log
environment=NODE_ENV="production",HOSTNAME="0.0.0.0",PORT="3000"
priority=10
