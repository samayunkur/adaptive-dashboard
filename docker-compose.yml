version: '3.9'

services:
  # Development environment
  adaptive-dashboard-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: adaptive-dashboard-dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - ./:/app
      - /app/node_modules
      - /app/.next
      # Persist data directory
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - dashboard-network

  # Production environment
  adaptive-dashboard-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adaptive-dashboard-prod
    ports:
      - "3000:3000"
    volumes:
      # Persist data directory
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - dashboard-network
    restart: unless-stopped

networks:
  dashboard-network:
    driver: bridge
